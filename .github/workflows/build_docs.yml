name: Build the documentation

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build-docs:
        name: Build docs
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout the branch
              uses: actions/checkout@v6
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
            - name: Install uv
              uses: astral-sh/setup-uv@v8.2.0
            - name: Build the documentation with MkDocs
              env:
                  DECIJAX_DOCS_EXECUTE: "1"
                  DECIJAX_DOCS_STRICT: "1"
                  # Silence the third-party MkDocs 2.0 / properdocs advert.
                  DISABLE_MKDOCS_2_WARNING: "true"
              run: |
                  uv sync --frozen --group docs
                  uv run mkdocs build
            - name: Upload pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: site

    deploy-docs:
        needs: build-docs
        name: Deploy docs
        runs-on: ubuntu-latest
        timeout-minutes: 10
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
