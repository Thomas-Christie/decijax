site_name: decijax
site_description: Documentation for the decijax library.
repo_url: https://github.com/Thomas-Christie/decijax
site_url: https://thomas-christie.github.io/decijax/
repo_name: Thomas-Christie/decijax

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - gen-files:
      scripts:
        - docs/scripts/convert_examples.py
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false

nav:
  - 🏡 Home: index.md
  - 💡 Background:
      - Intro to Bayesian Optimisation: _examples/intro_to_bo.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
